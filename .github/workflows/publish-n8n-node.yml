# Publishes n8n-nodes-parsedoc to npm WITH provenance.
# Required by n8n's verified-community-node program (since 2026-05-01): verified
# nodes must be published via GitHub Actions with a provenance statement, not from
# a local machine. After a successful run, submit the node via the n8n Creator Portal.
#
# Setup: add a repository secret NPM_TOKEN (npm automation/granular token with
# write access to n8n-nodes-parsedoc), then run this workflow (Actions tab → Run).
name: Publish n8n node (provenance)

on:
  workflow_dispatch:
  push:
    tags:
      - "n8n-node-v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: n8n-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# Publishes n8n-nodes-parsedoc to npm WITH provenance, using npm Trusted Publishing
# (OIDC) — no NPM_TOKEN secret needed. Required by n8n's verified-community-node
# program (since 2026-05-01): verified nodes must be published via GitHub Actions
# with a provenance statement, not from a local machine.
#
# One-time setup (on npmjs.com, package n8n-nodes-parsedoc → Settings → Trusted
# Publisher): add a GitHub Actions publisher → org/repo = wrapper-agency/parsedoc,
# workflow = publish-n8n-node.yml. Then run this workflow (Actions tab → Run),
# and submit the node via the n8n Creator Portal.
name: Publish n8n node (provenance)

on:
  workflow_dispatch:
  push:
    tags:
      - "n8n-node-v*"

permissions:
  contents: read
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: n8n-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
